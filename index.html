<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OneLine365</title>

<style>

body{
  font-family: sans-serif;
  background:#f4f4f4;
  text-align:center;
  margin-top:120px;
}

textarea{
  width:400px;
  height:80px;
  font-size:16px;
}

button{
  margin-top:20px;
  padding:10px 30px;
  font-size:16px;
}

</style>

</head>

<body>

<h1>OneLine365</h1>

<p>今天的一句话</p>

<textarea id="content"></textarea>

<br>

<button onclick="writeLine()">写下</button>

<p id="msg"></p>

<script>
// 页面加载时立刻执行状态检查
window.onload = async function() {
  const res = await fetch("http://localhost:3000/status");
  const data = await res.json();
  
  if (data.hasWrittenToday) {
    lockUI("今日情绪已沉入冰川。");
  }
}

async function writeLine() {
  const content = document.getElementById("content").value;
  
  if (!content.trim()) {
    document.getElementById("msg").innerText = "不能交白卷。";
    return;
  }

  const res = await fetch("http://localhost:3000/write", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ content: content })
  });

  const data = await res.json();

  if (data.success) {
    lockUI("写入成功。今日情绪已沉入冰川。");
  } else {
    document.getElementById("msg").innerText = data.message;
  }
}

// 隐藏输入框的核心逻辑
function lockUI(message) {
  document.getElementById("content").style.display = "none";
  document.querySelector("button").style.display = "none";
  document.querySelector("p").style.display = "none"; // 隐藏“今天的一句话”这几个字
  document.getElementById("msg").innerText = message;
  document.getElementById("msg").style.fontWeight = "bold";
  document.getElementById("msg").style.color = "#555";
}
</script>

</body>
</html>
